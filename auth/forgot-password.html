<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — BREAKOUT MUSIC Distribution</title>
  <meta name="description" content="Reset your BREAKOUT MUSIC Distribution account password." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/nela.css" />
  <style>
    body { background: #0B0B0F; }
    .success-icon { width: 72px; height: 72px; border-radius: 50%; background: rgba(16,185,129,0.15); border: 2px solid rgba(16,185,129,0.3); display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 20px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.2)} 50%{box-shadow:0 0 0 12px rgba(16,185,129,0)} }
  </style>
</head>
<body>
  <div class="auth-bg" style="background: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(139,92,246,0.08) 0%, transparent 60%), #0B0B0F;">
    <div class="auth-orb" style="width:350px;height:350px;background:#8B5CF6;opacity:0.08;top:-80px;left:-80px;"></div>

    <div class="auth-card" id="forgotCard">
      <div class="auth-logo">
        <div class="logo-icon">B</div>
        <span class="auth-logo-text">BREAKOUT MUSIC Distribution</span>
      </div>

      <!-- Step 1: Enter email -->
      <div id="step1">
        <div style="text-align:center;margin-bottom:28px;">
          <div style="font-size:48px;margin-bottom:12px;">🔍</div>
          <h1 class="auth-title">Forgot your password?</h1>
          <p class="auth-subtitle">Enter your email and we'll send you a reset link instantly</p>
        </div>

        <form id="forgotForm" onsubmit="handleForgot(event)">
          <div class="form-group">
            <label class="form-label" for="forgotEmail">Email Address</label>
            <div class="input-icon-wrap">
              <span class="input-icon">✉️</span>
              <input type="email" id="forgotEmail" class="form-input" placeholder="you@example.com" required autocomplete="email" />
            </div>
          </div>
          <button type="submit" id="forgotSubmit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">Send Reset Link →</button>
        </form>
      </div>

      <!-- Step 2: Success state -->
      <div id="step2" style="display:none;text-align:center;">
        <div class="success-icon">✅</div>
        <h2 style="font-size:22px;margin-bottom:10px;">Check your inbox!</h2>
        <p style="color:var(--text3);font-size:14px;line-height:1.7;margin-bottom:28px;">
          We've sent a password reset link to<br/>
          <strong id="sentEmail" style="color:var(--text2);"></strong>
        </p>
        <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 20px;margin-bottom:28px;text-align:left;">
          <p style="font-size:13px;color:var(--text3);line-height:1.6;">
            📬 <strong style="color:var(--text2);">Didn't receive it?</strong><br/>
            Check your spam folder or wait a few minutes. The link expires in <strong style="color:var(--purple-light);">15 minutes</strong>.
          </p>
        </div>
        <button type="button" class="btn btn-secondary btn-full" id="resendBtn" onclick="startResendCountdown()">Resend Email</button>
        <div id="countdown" style="display:none;font-size:13px;color:var(--text4);margin-top:12px;"></div>
      </div>

      <div class="auth-footer" style="margin-top:20px;">
        <a href="/auth/login.html">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script src="/shared/nela.js"></script>
  <script>
    function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value;
      const btn = document.getElementById('forgotSubmit');
      btn.textContent = '⏳ Sending...'; btn.disabled = true;
      setTimeout(() => {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('sentEmail').textContent = email;
      }, 1200);
    }
    function startResendCountdown() {
      const btn = document.getElementById('resendBtn');
      const cd = document.getElementById('countdown');
      btn.disabled = true; btn.style.opacity = '0.5';
      cd.style.display = 'block';
      let secs = 60;
      const interval = setInterval(() => {
        cd.textContent = `Resend available in ${secs}s`;
        secs--;
        if (secs < 0) {
          clearInterval(interval);
          btn.disabled = false; btn.style.opacity = '1';
          cd.style.display = 'none';
          showToast('Reset email resent!','success');
        }
      }, 1000);
    }
  </script>
</body>
</html>
