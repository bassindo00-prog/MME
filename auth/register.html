<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — BREAKOUT MUSIC Distribution</title>
  <meta name="description" content="Create your free BREAKOUT MUSIC Distribution account and start releasing your music worldwide." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/nela.css" />
  <style>
    body { background: #0B0B0F; }
    .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 8px; }
    .type-btn { padding: 12px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--border2); background: var(--surface); cursor: pointer; text-align: center; transition: all 0.2s; font-size: 13px; font-weight: 600; color: var(--text3); }
    .type-btn:hover { border-color: rgba(139,92,246,0.4); color: var(--text2); }
    .type-btn.selected { border-color: var(--purple); background: rgba(139,92,246,0.1); color: var(--purple-light); }
    .type-icon { display: block; font-size: 22px; margin-bottom: 4px; }
    .pw-wrap { position: relative; }
    .pw-wrap .form-input { padding-right: 42px; }
    .eye-btn { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text4); cursor: pointer; font-size: 15px; }
    .strength-bar { display: flex; gap: 4px; margin-top: 8px; }
    .strength-seg { height: 3px; flex: 1; border-radius: 2px; background: var(--border2); transition: background 0.3s; }
    .strength-seg.filled-weak { background: var(--red); }
    .strength-seg.filled-ok { background: var(--yellow); }
    .strength-seg.filled-strong { background: var(--green); }
    .auth-card { max-width: 520px; }
  </style>
</head>
<body>
  <div class="auth-bg" style="background: radial-gradient(ellipse 70% 70% at 80% 50%, rgba(59,130,246,0.09) 0%, transparent 55%), radial-gradient(ellipse 60% 60% at 20% 80%, rgba(139,92,246,0.1) 0%, transparent 50%), #0B0B0F; padding: 32px 24px;">
    <div class="auth-orb" style="width:500px;height:500px;background:#8B5CF6;opacity:0.08;top:-150px;right:-100px;"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">B</div>
        <span class="auth-logo-text">BREAKOUT MUSIC Distribution</span>
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Start distributing your music to 150+ platforms for free</p>

      <div class="social-login-row">
        <button type="button" class="social-login-btn" onclick="showToast('Google signup coming soon','info')">
          <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign up with Google
        </button>
      </div>

      <div class="auth-divider"><span>or with email</span></div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label class="form-label" for="regFirst">First Name</label>
            <input type="text" id="regFirst" class="form-input" placeholder="Alex" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="regLast">Last Name</label>
            <input type="text" id="regLast" class="form-input" placeholder="Johnson" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="regEmail" class="form-input" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Artist Type</label>
          <div class="type-grid">
            <div class="type-btn selected" onclick="selectType(this,'solo')"><span class="type-icon">🎤</span>Solo Artist</div>
            <div class="type-btn" onclick="selectType(this,'band')"><span class="type-icon">🎸</span>Band / Group</div>
            <div class="type-btn" onclick="selectType(this,'dj')"><span class="type-icon">🎧</span>DJ / Producer</div>
            <div class="type-btn" onclick="selectType(this,'label')"><span class="type-icon">💳</span>Record Label</div>
          </div>
          <input type="hidden" id="artistType" value="solo" />
        </div>
        <div class="form-group">
          <label class="form-label" for="regPass">Password</label>
          <div class="pw-wrap">
            <input type="password" id="regPass" class="form-input" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)" />
            <button type="button" class="eye-btn" onclick="togglePass('regPass',this)">👁️</button>
          </div>
          <div class="strength-bar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
            <div class="strength-seg" id="seg4"></div>
          </div>
          <div class="form-helper" id="strengthLabel">Enter a strong password</div>
        </div>
        <div class="checkbox-group" style="margin-bottom:24px;">
          <input type="checkbox" id="agreeTerms" required />
          <label for="agreeTerms">I agree to the <a href="#" style="color:var(--purple-light);">Terms of Service</a> and <a href="#" style="color:var(--purple-light);">Privacy Policy</a></label>
        </div>
        <button type="submit" id="regSubmit" class="btn btn-primary btn-full btn-lg">Create Free Account →</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/auth/login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/shared/nela.js"></script>
  <script>
    function selectType(el, val) {
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('artistType').value = val;
    }
    function togglePass(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }
    function checkStrength(val) {
      const segs = ['seg1','seg2','seg3','seg4'];
      const lbl = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const cls = score <= 1 ? 'filled-weak' : score <= 2 ? 'filled-ok' : 'filled-strong';
      const labels = ['','Weak','Fair','Strong','Very Strong'];
      segs.forEach((id, i) => {
        const el = document.getElementById(id);
        el.className = 'strength-seg' + (i < score ? ' ' + cls : '');
      });
      lbl.textContent = labels[score] || 'Enter a strong password';
      lbl.style.color = score <= 1 ? 'var(--red)' : score <= 2 ? 'var(--yellow)' : 'var(--green)';
    }
    function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regSubmit');
      btn.textContent = '⏳ Creating account...'; btn.disabled = true;
      
      const email = document.getElementById('regEmail').value.trim();
      const first = document.getElementById('regFirst').value.trim();
      const last = document.getElementById('regLast').value.trim();
      const pass = document.getElementById('regPass').value;
      const type = document.getElementById('artistType').value;

      setTimeout(() => {
        let users = JSON.parse(localStorage.getItem('nelaUsers')) || [];
        users.push({
          id: 'usr_' + Date.now(),
          email: email,
          firstName: first,
          lastName: last,
          password: btoa(pass), // simulated hash
          type: type,
          status: 'PENDING'
        });
        localStorage.setItem('nelaUsers', JSON.stringify(users));

        // Show Success Message
        const card = document.querySelector('.auth-card');
        card.innerHTML = `
          <div class="auth-logo">
            <div class="logo-icon">B</div>
            <span class="auth-logo-text">BREAKOUT MUSIC</span>
          </div>
          <div style="text-align:center; padding: 40px 0;">
            <div style="font-size:48px; margin-bottom:16px;">⏳</div>
            <h1 class="auth-title">Registrasi berhasil</h1>
            <p class="auth-subtitle" style="color:var(--text2); font-size: 16px;">
              Akun Anda sedang menunggu persetujuan Admin.
            </p>
            <p style="color:var(--text4); font-size:14px; margin-top:20px;">
              Anda tidak dapat login selama status masih PENDING. Kami akan memberitahu Anda setelah akun disetujui.
            </p>
            <a href="/auth/login.html" class="btn btn-secondary btn-full" style="margin-top:30px;">Kembali ke Login</a>
          </div>
        `;
      }, 1200);
    }

    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const plan = params.get('plan') || '';
      if (plan === 'label') {
        const labelBtn = document.querySelector('.type-btn[onclick*="label"]');
        if (labelBtn) selectType(labelBtn, 'label');
      }
    });
  </script>
</body>
</html>
