<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — BREAKOUT MUSIC Distribution</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/nela.css" />
  <style>
    body { background: #0B0B0F; }
    .code-inputs { display: flex; gap: 10px; justify-content: center; margin: 24px 0; }
    .code-input { width: 48px; height: 56px; border-radius: var(--radius-sm); border: 2px solid var(--border2); background: rgba(255,255,255,0.05); color: #fff; font-size: 22px; font-weight: 700; text-align: center; outline: none; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .code-input:focus { border-color: var(--purple); background: rgba(139,92,246,0.06); box-shadow: 0 0 0 3px rgba(139,92,246,0.12); }
  </style>
</head>
<body>
  <div class="auth-bg" style="background: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(139,92,246,0.08) 0%, transparent 60%), #0B0B0F;">
    <div class="auth-orb" style="width:350px;height:350px;background:#8B5CF6;opacity:0.08;top:-80px;left:-80px;"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">B</div>
        <span class="auth-logo-text">BREAKOUT MUSIC Distribution</span>
      </div>

      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:48px;margin-bottom:12px;">✉️</div>
        <h1 class="auth-title">Verify your email</h1>
        <p class="auth-subtitle">We've sent a 6-digit verification code to your email address.</p>
      </div>

      <form id="verifyForm" onsubmit="handleVerify(event)">
        <div class="code-inputs">
          <input type="text" maxlength="1" class="code-input" required pattern="[0-9]" inputmode="numeric" />
          <input type="text" maxlength="1" class="code-input" required pattern="[0-9]" inputmode="numeric" />
          <input type="text" maxlength="1" class="code-input" required pattern="[0-9]" inputmode="numeric" />
          <input type="text" maxlength="1" class="code-input" required pattern="[0-9]" inputmode="numeric" />
          <input type="text" maxlength="1" class="code-input" required pattern="[0-9]" inputmode="numeric" />
          <input type="text" maxlength="1" class="code-input" required pattern="[0-9]" inputmode="numeric" />
        </div>

        <button type="submit" id="verifySubmit" class="btn btn-primary btn-full btn-lg">Verify & Continue →</button>
      </form>

      <div style="text-align:center;margin-top:24px;">
        <button type="button" class="btn btn-secondary btn-sm" id="resendCodeBtn" onclick="resendCode()" style="background:transparent;border:none;">Resend Code</button>
        <div id="resendCountdown" style="font-size:12px;color:var(--text4);margin-top:8px;"></div>
      </div>

      <div class="auth-footer" style="margin-top:20px;">
        <a href="/auth/login.html">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script src="/shared/nela.js"></script>
  <script>
    // Auto-focus next input
    const inputs = document.querySelectorAll('.code-input');
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    function handleVerify(e) {
      e.preventDefault();
      const btn = document.getElementById('verifySubmit');
      btn.textContent = '⏳ Verifying...'; btn.disabled = true;
      setTimeout(() => {
        showToast('Email verified successfully!','success');
        setTimeout(() => {
          window.location.href = '/dashboard/index.html';
        }, 800);
      }, 1000);
    }

    function resendCode() {
      const btn = document.getElementById('resendCodeBtn');
      const cd = document.getElementById('resendCountdown');
      btn.disabled = true;
      let secs = 30;
      const interval = setInterval(() => {
        cd.textContent = `Resend available in ${secs}s`;
        secs--;
        if (secs < 0) {
          clearInterval(interval);
          btn.disabled = false;
          cd.textContent = '';
          showToast('New verification code sent!','info');
        }
      }, 1000);
    }
  </script>
</body>
</html>
