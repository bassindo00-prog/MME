<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — BREAKOUT MUSIC Distribution</title>
  <meta name="description" content="Sign in to your BREAKOUT MUSIC Distribution artist account and manage your music." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/nela.css" />
  <style>
    body { background: #0B0B0F; }
    .eye-btn { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text4); cursor: pointer; font-size: 15px; line-height: 1; }
    .pw-wrap { position: relative; }
    .pw-wrap .form-input { padding-right: 42px; }
  </style>
</head>
<body>
  <div class="auth-bg" style="background: radial-gradient(ellipse 70% 70% at 20% 50%, rgba(139,92,246,0.1) 0%, transparent 55%), radial-gradient(ellipse 60% 60% at 80% 20%, rgba(59,130,246,0.07) 0%, transparent 50%), #0B0B0F;">
    <div class="auth-orb" style="width:400px;height:400px;background:#8B5CF6;opacity:0.1;top:-120px;left:-100px;"></div>
    <div class="auth-orb" style="width:300px;height:300px;background:#3B82F6;opacity:0.07;bottom:-80px;right:-80px;"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">B</div>
        <span class="auth-logo-text">BREAKOUT MUSIC Distribution</span>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your artist account and manage your music</p>

      <div class="social-login-row">
        <button type="button" class="social-login-btn" id="googleSignIn" onclick="showToast('Google OAuth coming soon','info')">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button type="button" class="social-login-btn" id="appleSignIn" onclick="showToast('Apple Sign-In coming soon','info')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.42.07 2.41.74 3.24.8.93-.17 1.8-.87 3.3-.8 1.92.14 3.24.92 4.09 2.4-3.64 2.12-3.04 7.12.76 8.58-.65 1.58-1.46 3.14-3.39 3.9zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Apple
        </button>
      </div>

      <div class="auth-divider"><span>or continue with email</span></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;justify-content:space-between;text-transform:none;letter-spacing:0;">
            <span style="text-transform:uppercase;letter-spacing:0.4px;font-size:11px;">Password</span>
            <a href="/auth/forgot-password.html" style="color:var(--purple-light);font-size:12px;font-weight:600;">Forgot password?</a>
          </label>
          <div class="pw-wrap">
            <div class="input-icon-wrap">
              <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-top:-2px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
              <input type="password" id="loginPass" class="form-input" placeholder="••••••••" required autocomplete="current-password" style="padding-left:42px;padding-right:42px;" />
            </div>
            <button type="button" class="eye-btn" onclick="togglePass('loginPass',this)" aria-label="Toggle password">👁️ </button>
          </div>
        </div>
        <div class="checkbox-group" style="margin-bottom:24px;">
          <input type="checkbox" id="rememberMe" />
          <label for="rememberMe">Remember me for 30 days</label>
        </div>
        <button type="submit" id="loginSubmit" class="btn btn-primary btn-full btn-lg">Sign In →</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/auth/register.html">Create one free</a>
      </div>
    </div>
  </div>

  <script src="/shared/nela.js"></script>
  <script>
    function togglePass(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginSubmit');
      btn.textContent = '⏳ Signing in...'; btn.disabled = true;
      
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      
      setTimeout(() => {
        let users = JSON.parse(localStorage.getItem('nelaUsers')) || [];
        let user = users.find(u => u.email === email);
        
        if (user) {
          if (user.password !== btoa(pass)) {
            showToast('Invalid email or password.', 'error');
            btn.textContent = 'Sign In →'; btn.disabled = false;
            return;
          }
          if (user.status === 'PENDING') {
            showToast('Akun Anda masih PENDING. Menunggu persetujuan Admin.', 'warning');
            btn.textContent = 'Sign In →'; btn.disabled = false;
            return;
          }
          if (user.status === 'REJECTED') {
            showToast('Akun Anda telah ditolak oleh Admin.', 'error');
            btn.textContent = 'Sign In →'; btn.disabled = false;
            return;
          }
          // Login success
          localStorage.setItem('nelaCurrentUser', JSON.stringify(user));
          localStorage.setItem('activeDashboardUserId', user.id);
          window.location.href = '/dashboard/index.html';
        } else {
          // If no user found, just fallback to success for demo purposes, 
          // or we can strictly enforce registration. Let's enforce it since we built registration.
          showToast('Account not found. Please register first.', 'error');
          btn.textContent = 'Sign In →'; btn.disabled = false;
        }
      }, 1100);
    }
  </script>
</body>
</html>
