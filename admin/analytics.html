<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    try {
      if (localStorage.getItem('adminLoggedIn') !== 'true') {
        window.location.href = 'login.html';
      }
    } catch (e) {
      console.warn("localStorage block:", e);
    }
  </script>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Analytics — BREAKOUT MUSIC Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared/nela.css" />
</head>
<body>
  <div class="app-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="hamburger-btn" id="hamburgerBtn">
            <span></span><span></span><span></span>
          </button>
          <div>
            <h1 class="topbar-title">Manual Analytics</h1>
            <p class="topbar-sub">Input user analytics data manually to update User Dashboard.</p>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="card reveal" style="max-width: 800px; margin: 0 auto; padding: 32px;">
          <form id="analyticsForm" onsubmit="saveAnalytics(event)">
            <h2 style="font-size:20px;margin-bottom:24px;">Update User Analytics</h2>

            <div class="form-group" style="margin-bottom: 24px;">
              <label class="form-label" for="artistSelect">Pilih Artis</label>
              <select id="artistSelect" class="form-select" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 6px; color: #fff;">
                <!-- Dynamically populated -->
              </select>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group">
                <label class="form-label" for="totalStreams">Total Streaming</label>
                <input type="number" id="totalStreams" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="totalListeners">Total Listener</label>
                <input type="number" id="totalListeners" class="form-input" required />
              </div>
            </div>

            <h3 style="font-size:16px; margin: 24px 0 16px;">Platform Streams</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group">
                <label class="form-label" for="spotify">Spotify Streams</label>
                <input type="number" id="spotify" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="apple">Apple Music Streams</label>
                <input type="number" id="apple" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="youtube">YouTube Music Streams</label>
                <input type="number" id="youtube" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="tiktok">TikTok Streams</label>
                <input type="number" id="tiktok" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="amazon">Amazon Music Streams</label>
                <input type="number" id="amazon" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="joox">Joox Streams</label>
                <input type="number" id="joox" class="form-input" required />
              </div>
            </div>

            <h3 style="font-size:16px; margin: 24px 0 16px;">Revenue & Royalty</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group">
                <label class="form-label" for="grossRevenue">Pendapatan Kotor</label>
                <input type="number" step="0.01" id="grossRevenue" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="deductions">Potongan (%)</label>
                <input type="number" step="0.01" id="deductions" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="netRoyalty">Royalti Bersih</label>
                <input type="number" step="0.01" id="netRoyalty" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="currency">Mata Uang</label>
                <select id="currency" class="form-select">
                  <option value="USD">USD</option>
                  <option value="IDR">IDR</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="reportDate">Tanggal Laporan</label>
                <input type="date" id="reportDate" class="form-input" required />
              </div>
            </div>

            <div style="margin-top: 32px; display: flex; justify-content: flex-end;">
              <button type="submit" class="btn btn-primary btn-lg">Simpan Analytics</button>
            </div>
          </form>
        </div>
        
        <!-- Table Overview -->
        <div class="card reveal" style="max-width: 800px; margin: 24px auto 0; padding: 32px;">
          <h2 style="font-size:20px;margin-bottom:24px;">Daftar Data Analytics Artis</h2>
          <div class="table-responsive">
            <table class="table" id="analyticsOverviewTable">
              <thead>
                <tr>
                  <th>Artis</th>
                  <th>Total Streams</th>
                  <th>Pendapatan Kotor</th>
                  <th>Potongan</th>
                  <th>Royalti Bersih</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="analyticsTableBody">
                <!-- Populated via JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../shared/nela.js?v=7"></script>
  <script>
    renderAdminSidebar('analytics');

    window.addEventListener('DOMContentLoaded', () => {
      // Load users from mock DB
      const users = JSON.parse(localStorage.getItem('nelaUsers')) || [];
      let artists = users.filter(u => u.type === 'artist');
      
      // Also pull unique artists from releases (since users can upload without registering in this demo)
      try {
        const db = JSON.parse(localStorage.getItem('nela_db'));
        if (db && db.releases) {
          db.releases.forEach(r => {
            if (r.artist && !artists.find(a => a.name === r.artist || a.id === r.artist)) {
              artists.push({ id: r.artist, name: r.artist, email: 'Unregistered' });
            }
          });
        }
      } catch(e) {}

      const select = document.getElementById('artistSelect');
      
      if (artists.length === 0) {
        select.innerHTML = '<option value="">Belum ada artis terdaftar</option>';
      } else {
        select.innerHTML = '<option value="" disabled selected>-- Pilih Artis --</option>' + artists.map(a => `<option value="${a.id}">${a.name} (${a.email})</option>`).join('');
      }

      // Listener for change
      select.addEventListener('change', (e) => {
        if (e.target.value) {
          loadAnalytics(e.target.value);
        }
      });

      // Auto-calculate Net Royalty
      document.getElementById('grossRevenue').addEventListener('input', calculateNetRoyalty);
      document.getElementById('deductions').addEventListener('input', calculateNetRoyalty);

      renderAnalyticsTable(artists);
    });

    function renderAnalyticsTable(artistsList) {
      const tbody = document.getElementById('analyticsTableBody');
      tbody.innerHTML = '';
      
      let hasData = false;
      artistsList.forEach(a => {
        const rawData = localStorage.getItem(`userAnalytics_${a.id}`);
        if (rawData) {
          hasData = true;
          const data = JSON.parse(rawData);
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><strong>${a.name}</strong></td>
            <td>${(data.totalStreams || 0).toLocaleString()}</td>
            <td>${data.currency || 'USD'} ${(data.grossRevenue || 0).toLocaleString()}</td>
            <td>${data.deductions || 0}%</td>
            <td><strong>${data.currency || 'USD'} ${(data.netRoyalty || 0).toLocaleString()}</strong></td>
            <td>
              <button class="btn btn-secondary btn-sm" onclick="editArtistAnalytics('${a.id}')">Edit</button>
            </td>
          `;
          tbody.appendChild(tr);
        }
      });

      if (!hasData) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text4);">Belum ada data analytics yang tersimpan.</td></tr>';
      }
    }

    function editArtistAnalytics(artistId) {
      const select = document.getElementById('artistSelect');
      select.value = artistId;
      loadAnalytics(artistId);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function calculateNetRoyalty() {
      const gross = parseFloat(document.getElementById('grossRevenue').value) || 0;
      const deductionPct = parseFloat(document.getElementById('deductions').value) || 0;
      
      const net = gross - (gross * (deductionPct / 100));
      document.getElementById('netRoyalty').value = net.toFixed(2);
    }

    function loadAnalytics(userId) {
      // We store each user's analytics as userAnalytics_{userId}
      const data = JSON.parse(localStorage.getItem(`userAnalytics_${userId}`)) || {
        totalStreams: 0,
        spotify: 0, apple: 0, youtube: 0, tiktok: 0, amazon: 0, joox: 0,
        totalListeners: 0, grossRevenue: 0, deductions: 0, netRoyalty: 0,
        currency: 'USD', reportDate: new Date().toISOString().split('T')[0]
      };
      
      document.getElementById('totalStreams').value = data.totalStreams || 0;
      document.getElementById('totalListeners').value = data.totalListeners || 0;
      document.getElementById('spotify').value = data.spotify || 0;
      document.getElementById('apple').value = data.apple || 0;
      document.getElementById('youtube').value = data.youtube || 0;
      document.getElementById('tiktok').value = data.tiktok || 0;
      document.getElementById('amazon').value = data.amazon || 0;
      document.getElementById('joox').value = data.joox || 0;
      document.getElementById('grossRevenue').value = data.grossRevenue || 0;
      document.getElementById('deductions').value = data.deductions || 0;
      document.getElementById('netRoyalty').value = data.netRoyalty || 0;
      document.getElementById('currency').value = data.currency || 'USD';
      document.getElementById('reportDate').value = data.reportDate || '';
    }

    function saveAnalytics(e) {
      e.preventDefault();
      const select = document.getElementById('artistSelect');
      const userId = select.value;

      if (!userId) {
        showToast('Pilih artis terlebih dahulu!', 'error');
        return;
      }

      const data = {
        totalStreams: parseFloat(document.getElementById('totalStreams').value),
        totalListeners: parseFloat(document.getElementById('totalListeners').value),
        spotify: parseFloat(document.getElementById('spotify').value),
        apple: parseFloat(document.getElementById('apple').value),
        youtube: parseFloat(document.getElementById('youtube').value),
        tiktok: parseFloat(document.getElementById('tiktok').value),
        amazon: parseFloat(document.getElementById('amazon').value),
        joox: parseFloat(document.getElementById('joox').value),
        grossRevenue: parseFloat(document.getElementById('grossRevenue').value),
        deductions: parseFloat(document.getElementById('deductions').value),
        netRoyalty: parseFloat(document.getElementById('netRoyalty').value),
        currency: document.getElementById('currency').value,
        reportDate: document.getElementById('reportDate').value
      };
      
      // Save specific to this user
      localStorage.setItem(`userAnalytics_${userId}`, JSON.stringify(data));
      // For the demo purposes: tell User Dashboard which user is "active"
      localStorage.setItem('activeDashboardUserId', userId);
      
      showToast('Data Analytics berhasil disimpan. User ini akan melihat datanya di Dasbor!', 'success');
      
      // Reset form so admin can easily input the next artist
      document.getElementById('analyticsForm').reset();
      
      // Re-render table
      const users = JSON.parse(localStorage.getItem('nelaUsers')) || [];
      let artists = users.filter(u => u.type === 'artist');
      try {
        const db = JSON.parse(localStorage.getItem('nela_db'));
        if (db && db.releases) {
          db.releases.forEach(r => {
            if (r.artist && !artists.find(a => a.name === r.artist || a.id === r.artist)) {
              artists.push({ id: r.artist, name: r.artist, email: 'Unregistered' });
            }
          });
        }
      } catch(e) {}
      renderAnalyticsTable(artists);
    }
  </script>
</body>
</html>
