<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — BREAKOUT MUSIC</title>
  <meta name="description" content="Sign in to your BREAKOUT MUSIC Distribution admin dashboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" />  <link rel="stylesheet" href="../shared/nela.css" />
  <style>
    body { background: #0B0B0F; }
    .eye-btn { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text4); cursor: pointer; font-size: 15px; line-height: 1; }
    .pw-wrap { position: relative; }
    .pw-wrap .form-input { padding-right: 42px; }
  </style>
</head>
<body>
  <div class="auth-bg" style="background: radial-gradient(ellipse 70% 70% at 20% 50%, rgba(239,68,68,0.06) 0%, transparent 55%), radial-gradient(ellipse 60% 60% at 80% 20%, rgba(249,115,22,0.04) 0%, transparent 50%), #0B0B0F;">
    <div class="auth-orb" style="width:400px;height:400px;background:#EF4444;opacity:0.06;top:-120px;left:-100px;"></div>
    <div class="auth-orb" style="width:300px;height:300px;background:#F97316;opacity:0.04;bottom:-80px;right:-80px;"></div>

    <div class="auth-card" style="border-color: rgba(239,68,68,0.2); box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 40px rgba(239,68,68,0.15);">
      <div class="auth-logo">
        <div class="logo-icon" style="background:linear-gradient(135deg,#EF4444,#F97316)">B</div>
        <span class="auth-logo-text">Admin Panel</span>
      </div>

      <h1 class="auth-title">System Sign In</h1>
      <p class="auth-subtitle">Sign in to your administrative dashboard</p>

      <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
        <div class="form-group">
          <label class="form-label" for="adminUsername">Username</label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="adminUsername" class="form-input" placeholder="avelin12" required autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;justify-content:space-between;text-transform:none;letter-spacing:0;">
            <span style="text-transform:uppercase;letter-spacing:0.4px;font-size:11px;">Password</span>
            <a href="forgot-password.html" style="color:#FF6B6B;font-size:12px;font-weight:600;">Forgot password?</a>
          </label>
          <div class="pw-wrap">
            <div class="input-icon-wrap">
              <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-top:-2px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
              <input type="password" id="adminPass" class="form-input" placeholder="••••••••" required autocomplete="current-password" style="padding-left:42px;padding-right:42px;" />
            </div>
            <button type="button" class="eye-btn" onclick="togglePass('adminPass',this)" aria-label="Toggle password">👁️ </button>
          </div>
        </div>
        
        <button type="submit" id="loginSubmit" class="btn btn-primary btn-full btn-lg" style="background:linear-gradient(135deg,#EF4444,#F97316);box-shadow:0 4px 20px rgba(239,68,68,0.3);margin-top:20px;">Sign In to Dashboard →</button>
      </form>
    </div>
  </div>

  <script src="../shared/nela.js"></script>
  <script>
    function togglePass(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️ ' : '🙈';
    }
    function handleAdminLogin(e) {
      e.preventDefault();
      const username = document.getElementById('adminUsername').value.trim();
      const pass = document.getElementById('adminPass').value.trim();
      const btn = document.getElementById('loginSubmit');
      
      btn.textContent = '⏳ Verifying credentials...'; btn.disabled = true;
      
      setTimeout(() => {
        // Mock hashed password verification
        // avelin12 / 12345
        if (username === 'avelin12' && btoa(pass) === btoa('12345')) {
          localStorage.setItem('adminLoggedIn', 'true');
          if (typeof showToast === 'function') {
            showToast('Access granted! Redirecting...','success');
          }
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 800);
        } else {
          if (typeof showToast === 'function') {
            showToast('Invalid admin username or password. Please try again.','error');
          } else {
            alert('Invalid admin username or password. Please try again.');
          }
          btn.textContent = 'Sign In to Dashboard →'; btn.disabled = false;
        }
      }, 1000);
    }
  </script>
</body>
</html>
